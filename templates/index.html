<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virus Spread Simulation</title>

    <!-- CSS in static file -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<header class="header">
    <h1>Virus Spread Simulation</h1>
    <p>Explore how diseases evolve over time</p>
</header>

<main class="container">

    <section class="card">
        <h2>Parameters</h2>

        <div class="grid">

            <label>Susceptible
                <input type="number" id="susceptible" min="0" step="1">
            </label>

            <label>Infected
                <input type="number" id="infected" min="0" step="1">
            </label>

            <label>Beta (spread rate)
                <input type="number" id="beta" placeholder="e.g. 0.22" min="0" step="0.01">
            </label>

            <label>Gamma (recovery rate)
                <input type="number" id="gamma" placeholder="e.g. 0.1" min="0" step="0.01">
            </label>

            <label>Mu (death rate)
                <input type="number" id="mu" placeholder="e.g. 0.01" min="0" step="0.01">
            </label>

            <label>Days
                <input type="number" id="days" placeholder="e.g. 100" min="1" step="1">
            </label>

        </div>

        <div class="buttons">
            <button id="runBtn">Run Simulation</button>
            <button id="resetBtn" class="secondary">Reset</button>
        </div>
    </section>

    <section class="card">
        <h2>Results</h2>
        <canvas id="sirChart"></canvas>
    </section>

</main>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/static/js/chart.js"></script>

</body>
</html>
